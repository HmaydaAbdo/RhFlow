version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# RH Flow — Infrastructure locale de développement
#
# Services inclus :
#   postgres      — Base de données principale (pgvector)
#   pgadmin       — Interface d'administration PostgreSQL
#   minio         — Stockage objet S3-compatible pour les CVs
#   docling-serve — Microservice de parsing documents (PDF/DOCX → Markdown)
#
# ── Démarrage ─────────────────────────────────────────────────────────────────
#   cp .env.example .env        # Remplir les variables requises
#   docker compose up -d        # Démarrer l'infrastructure
#   ./mvnw spring-boot:run      # Démarrer Spring Boot en local
#
# ── Réseau & presigned URLs MinIO ─────────────────────────────────────────────
#   Spring Boot tourne en local (hôte) et génère des presigned URLs MinIO.
#   docling-serve tourne dans Docker et doit pouvoir les consommer.
#
#   Solution : MINIO_ENDPOINT=http://host.docker.internal:9000 dans le .env
#   →